{% extends 'base.html' %}

{% block title %}Edit User - LifeVault{% endblock %}

{% block content %}
<div class="breadcrumb">
    <a href="{% url 'manage_users' %}">Users</a> &gt; Edit
</div>

<div class="panel">
    <h1 class="panel-title">✏️ Edit User</h1>
    
    <form method="POST" class="form-container" style="max-width: 600px;">
        {% csrf_token %}
        
        {% for field in form %}
            <div class="form-group {% if field.errors %}errors{% endif %}">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div class="form-errors">
                        {{ field.errors }}
                    </div>
                {% endif %}
            </div>
        {% endfor %}
        
        <div class="button-group">
            <button type="submit" class="btn">Update User</button>
            <a href="{% url 'manage_users' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
