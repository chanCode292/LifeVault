<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeVault | Register</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f3f4f6;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    width:480px;
    background:#fff;
    padding:40px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    font-size:55px;
    color:#0f172a;
}

.subtitle{
    text-align:center;
    color:#666;
    margin:10px 0 35px;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:500;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:15px;
}

input:focus{
    outline:none;
    border-color:#2563eb;
}

button{
    width:100%;
    padding:13px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

hr{
    margin:25px 0;
}

.bottom{
    text-align:center;
}

.bottom a{
    text-decoration:none;
    color:#2563eb;
}

.helptext{
    display:none;
}

ul{
    list-style:none;
    color:red;
    margin-bottom:10px;
    padding:0;
}

</style>

</head>

<body>

<div class="card">

<h1>LifeVault</h1>
<p class="subtitle">Create a new account</p>

<form method="POST">

{% csrf_token %}

<div class="form-group">
<label>First Name</label>
{{ form.first_name }}
</div>

<div class="form-group">
<label>Last Name</label>
{{ form.last_name }}
</div>

<div class="form-group">
<label>Username</label>
{{ form.username }}
</div>

<div class="form-group">
<label>Email Address</label>
{{ form.email }}
</div>

<div class="form-group">
<label>Password</label>
{{ form.password1 }}
</div>

<div class="form-group">
<label>Confirm Password</label>
{{ form.password2 }}
</div>

<button type="submit">
Register
</button>

</form>

<hr>

<div class="bottom">
Already have an account?
<a href="{% url 'login' %}">Login</a>
</div>

</div>

</body>
</html>
