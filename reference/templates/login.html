<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeVault | Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    width:420px;
    background:#fff;
    padding:40px;
    border-radius:12px;
    box-shadow:0 10px 40px rgba(0,0,0,.2);
}

h1{
    text-align:center;
    font-size:36px;
    color:#0f172a;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:30px;
    font-size:14px;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:500;
    color:#1e293b;
}

input[type="email"], input[type="password"]{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:15px;
    transition:border-color 0.3s;
}

input:focus{
    outline:none;
    border-color:#2563eb;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}

button{
    width:100%;
    padding:13px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
    font-weight:bold;
    transition:background 0.3s;
}

button:hover{
    background:#1d4ed8;
}

.error-list{
    background:#fee2e2;
    color:#991b1b;
    padding:12px;
    border-radius:6px;
    margin-bottom:15px;
    border-left:4px solid #dc2626;
}

.divider{
    margin:25px 0;
    text-align:center;
    color:#ccc;
}

.bottom{
    text-align:center;
    font-size:14px;
}

.bottom a{
    text-decoration:none;
    color:#2563eb;
    font-weight:bold;
    transition:color 0.3s;
}

.bottom a:hover{
    color:#1d4ed8;
}
</style>
</head>

<body>

<div class="card">

<h1>LifeVault</h1>
<p class="subtitle">Access your secure vault</p>

{% if messages %}
    <div class="error-list">
        {% for message in messages %}
            <p>{{ message }}</p>
        {% endfor %}
    </div>
{% endif %}

<form method="POST">
    {% csrf_token %}

    <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="Enter your email" required>
    </div>

    <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password" required>
    </div>

    <button type="submit">Login</button>
</form>

<div class="divider">or</div>

<div class="bottom">
    Don't have an account?
    <a href="{% url 'register' %}">Create one here</a>
</div>

</div>

</body>
</html>
